<!DOCTYPE html>
<html>
<head>
<meta http-equiv="refresh" content="0; url=en/index.html" />
<script>
  var lang = navigator.language || navigator.userLanguage;
  if (lang.startsWith('tr')) window.location.href = 'tr/index.html';
  else if (lang.startsWith('ar')) window.location.href = 'ar/index.html';
  else if (lang.startsWith('fr')) window.location.href = 'fr/index.html';
  else if (lang.startsWith('id')) window.location.href = 'id/index.html';
  else window.location.href = 'en/index.html';
</script>
</head>
<body>Redirecting...</body>
</html>
